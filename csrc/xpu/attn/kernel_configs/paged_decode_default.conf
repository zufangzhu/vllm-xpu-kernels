# =============================================================================
# Default paged decode kernel configuration
# =============================================================================
# Covers the most active open-source models: Llama, Qwen, DeepSeek
#
# Model → config mapping:
#   Llama-2/3 (7B–70B), CodeLlama  → head_size=128, qgroup=8
#   Qwen2/2.5/3 (7B–235B)          → head_size=128, qgroup=8
#   DeepSeek-V2/V3/R1 (MLA heads)  → head_size=192, qgroup=8
#
# All models: causal=true, local=false, sink=false (standard autoregressive)
#
# Format: qgroup,headsize,pagesize,causal,local,sink
#
# This config generates: 6 kernels (vs 416 full → ~99% reduction)
# To enable sliding-window (Qwen2.5 / Llama-3.1 long context):
#   uncomment the local=true lines below.
# To cover Gemma-2 (head_size=256), add: 8,256,16,true,false,false etc.

# --- Llama / Qwen family (head_size=128) ------------------------------------
8,128,16,true,false,false
8,128,32,true,false,false
8,128,64,true,false,false
8,128,64,false,false,false

# Sliding window (Qwen2.5, Llama-3.1 long context) — uncomment if needed:
# 8,128,16,true,true,false
# 8,128,32,true,true,false
# 8,128,64,true,true,false

# --- DeepSeek MLA latent heads (head_size=192) ------------------------------
8,192,16,true,false,false
8,192,32,true,false,false
8,192,64,true,false,false

8,64,16,false,false,false
8,64,64,false,false,false

# openai/gpt-oss-20b
8,64,64,false,true,true
8,64,64,false,false,true