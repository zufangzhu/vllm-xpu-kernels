# =============================================================================
# Full kernel configuration (default - builds ALL combinations)
# =============================================================================
# This produces the maximum number of kernels (384 instantiations).
# Use model-specific configs to reduce compile time and binary size.
#
# Format: qgroup,headsize,pagesize[,causal,local,sink]
#   - qgroup: 8 or 16 (num_heads_q / num_heads_kv, clamped to nearest)
#   - headsize: 64, 96, 128, 192, 256, or 512
#   - pagesize: 16, 32, 64, or 128
#   - causal/local/sink: true or false (optional; if omitted, all 8 combos generated)
#
# Lines starting with # are comments. Empty lines are ignored.
# Use 'all' as a special keyword to build everything.

all
