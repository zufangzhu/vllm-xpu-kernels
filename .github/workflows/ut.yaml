name: run unit tests on Intel GPU.

on: 
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly full-scope run at 03:00 CST (19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope: full, ci, mini, ondemand:llama, ondemand:deepseek'
        required: false
        default: 'ci'

permissions: 
  contents: read

concurrency:
  # Group by PR number for pull_request, by ref for push/schedule/dispatch.
  # Only cancel in-progress runs for pull_request events; push to main and schedule are never cancelled.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: localhost:5000
  # Nightly (schedule) → full scope; manual dispatch → user choice; PR/push → ci scope
  XPU_KERNEL_TEST_SCOPE: ${{ github.event_name == 'schedule' && 'full' || github.event.inputs.test_scope || 'ci' }}

jobs:

  build-docker-image-latest-pvc:
    runs-on: self-hosted-pvc-cpu
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u):$(id -g)" . || true
          git clean -ffdx || true
          git reset --hard || true
          
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          set-safe-directory: true
          clean: true

      - name: Set image tag
        id: set-tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: build docker image & push to local
        id: build-image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t "xpu-kernel-ci-image:${IMAGE_TAG}" -f Dockerfile.xpu .
          docker tag "xpu-kernel-ci-image:${IMAGE_TAG}" "${{ env.REGISTRY }}/xpu-kernel-ci-image:${IMAGE_TAG}"
          docker push "${{ env.REGISTRY }}/xpu-kernel-ci-image:${IMAGE_TAG}"

  build-docker-image-latest-bmg:
    runs-on: self-hosted-bmg
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u):$(id -g)" . || true
          git clean -ffdx || true
          git reset --hard || true
          
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          set-safe-directory: true
          clean: true

      - name: Set image tag
        id: set-tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: build docker image & push to local
        id: build-image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t "xpu-kernel-ci-image:${IMAGE_TAG}" -f Dockerfile.xpu .
          docker tag "xpu-kernel-ci-image:${IMAGE_TAG}" "${{ env.REGISTRY }}/xpu-kernel-ci-image:${IMAGE_TAG}"
          docker push "${{ env.REGISTRY }}/xpu-kernel-ci-image:${IMAGE_TAG}"

  # Build wheel only once on PVC, then share via GitHub Actions artifact.
  # BMG runner cannot reach PVC directly (different network segment), so the
  # artifact service (GitHub) acts as the neutral transfer point.
  build-wheel:
    runs-on: self-hosted-pvc-cpu
    needs: build-docker-image-latest-pvc
    container:
      image: localhost:5000/xpu-kernel-ci-image:${{ needs.build-docker-image-latest-pvc.outputs.image_tag }}
      options: --device /dev/dri -v /dev/dri/by-path:/dev/dri/by-path --privileged -v ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          set-safe-directory: true

      - name: build wheel
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          export CCACHE_DIR=/root/.ccache
          export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
          export CCACHE_NOHASHDIR=1
          export CCACHE_COMPILERCHECK=content
          ccache -s || true
          ccache -p || true
          git submodule sync && git submodule update --init --recursive
          uv pip install -r requirements.txt
          rm -rf dist/*
          MAX_JOBS=128 uv build --no-build-isolation --wheel -v
          ccache -s || true

      - name: print wheel size
        run: |
          find dist -name '*.whl' -exec ls -lh {} +

      - name: report wheel size
        run: |
          WHEEL_NAME=$(find dist -name '*.whl' -printf '%f\n' | head -1)
          WHEEL_SIZE=$(find dist -name '*.whl' -exec stat --format='%s' {} + | awk '{printf "%.2f MB", $1/1024/1024}')
          {
            echo "### Wheel Size"
            echo "| Wheel | Size |"
            echo "|-------|------|"
            echo "| \`${WHEEL_NAME}\` | **${WHEEL_SIZE}** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpu-kernel-wheel
          path: dist/*.whl
          retention-days: 15

  build-wheel-with-default-config:
    runs-on: self-hosted-pvc-cpu
    needs: build-docker-image-latest-pvc
    container:
      image: localhost:5000/xpu-kernel-ci-image:${{ needs.build-docker-image-latest-pvc.outputs.image_tag }}
      options: --device /dev/dri -v /dev/dri/by-path:/dev/dri/by-path --privileged -v ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          set-safe-directory: true

      - name: build wheel with default kernel config
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          export CCACHE_DIR=/root/.ccache
          export CCACHE_BASEDIR="${GITHUB_WORKSPACE}"
          export CCACHE_NOHASHDIR=1
          export CCACHE_COMPILERCHECK=content
          ccache -s || true
          ccache -p || true
          git submodule sync && git submodule update --init --recursive
          uv pip install -r requirements.txt
          rm -rf dist/*
          # Build with default kernel config to test the kernel configuration system
          VLLM_CHUNK_PREFILL_CONFIG=chunk_prefill_default.conf \
          VLLM_PAGED_DECODE_CONFIG=paged_decode_default.conf \
          VLLM_VERSION_OVERRIDE="$(git describe --tags --long --match 'v*' 2>/dev/null | sed 's/^v//' || echo '0.0.0.dev0')" \
          MAX_JOBS=128 uv build --no-build-isolation --wheel -v
          ccache -s || true

      - name: print wheel size
        run: |
          find dist -name '*.whl' -exec ls -lh {} +

      - name: report wheel size
        run: |
          WHEEL_NAME=$(find dist -name '*.whl' -printf '%f\n' | head -1)
          WHEEL_SIZE=$(find dist -name '*.whl' -exec stat --format='%s' {} + | awk '{printf "%.2f MB", $1/1024/1024}')
          {
            echo "### Kernel Config System Test — Wheel Size"
            echo "| Wheel | Size |"
            echo "|-------|------|"
            echo "| \`${WHEEL_NAME}\` | **${WHEEL_SIZE}** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpu-kernel-wheel-default-config
          path: dist/*.whl
          retention-days: 7

  run-unit-tests-pvc:
    runs-on: self-hosted-pvc
    needs: [build-docker-image-latest-pvc, build-wheel]
    timeout-minutes: 50
    container:                      
      image: localhost:5000/xpu-kernel-ci-image:${{ needs.build-docker-image-latest-pvc.outputs.image_tag }}
      options: --device /dev/dri -v /dev/dri/by-path:/dev/dri/by-path --privileged -v ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          set-safe-directory: true

      - name: download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: xpu-kernel-wheel
          path: dist/

      - name: install wheel
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          uv pip install -r requirements.txt
          VLLM_USE_PRECOMPILED=1 VLLM_PRECOMPILED_WHEEL_LOCATION=$(find dist -name '*.whl' -print -quit) uv pip install --no-build-isolation -e . -v

      - name: test 
        run: |
          echo "Running tests with XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }}"
          XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 SKIP_ACC_ERROR_KERNEL=1 pytest -v -s tests/ --ignore=tests/test_fp8_gemm_onednn.py
          VLLM_XPU_FORCE_XE_DEFAULT_KERNEL=1 XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 pytest -v -s tests/fused_moe/test_grouped_gemm.py::test_grouped_gemm
          VLLM_XPU_FORCE_XE_DEFAULT_KERNEL=1 XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 SKIP_HANG_KERNEL=1 SKIP_ACC_ERROR_KERNEL=1 pytest -v -s tests/test_fp8_gemm_onednn.py

  clean-repo-pvc:
    runs-on: self-hosted-pvc
    needs: run-unit-tests-pvc
    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u):$(id -g)" . || true
          git clean -ffdx || true
          git reset --hard || true

  run-unit-tests-bmg:
    runs-on: self-hosted-bmg
    needs: [build-docker-image-latest-bmg, build-wheel]
    timeout-minutes: 50
    container: 
      image: localhost:5000/xpu-kernel-ci-image:${{ needs.build-docker-image-latest-bmg.outputs.image_tag }}
      options: --device /dev/dri -v /dev/dri/by-path:/dev/dri/by-path --privileged -v ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          set-safe-directory: true

      - name: download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: xpu-kernel-wheel
          path: dist/

      - name: install wheel
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          uv pip install -r requirements.txt
          VLLM_USE_PRECOMPILED=1 VLLM_PRECOMPILED_WHEEL_LOCATION=$(find dist -name '*.whl' -print -quit) uv pip install --no-build-isolation -e . -v

      - name: test 
        run: |
          echo "Running tests with XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }}"
          # tests/test_moe_align_block_size.py, tests/test_moe_lora_align_sum.py takes much time than expected. ignore it for now.
          XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 pytest -v -s tests/ --ignore=tests/test_lora_ops.py --ignore=tests/test_fp8_quant.py --ignore=tests/test_moe_align_block_size.py --ignore=tests/test_moe_lora_align_sum.py --ignore=tests/test_cache.py::test_swap_blocks --ignore=tests/test_topk_per_row.py --ignore=tests/test_lora_ops.py --ignore=tests/test_fp8_gemm_onednn.py
          XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 pytest -v -s tests/test_fp8_gemm_onednn.py
          # fixme: Running lora UT separately to avoid OOM when running together with other tests.
          XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 pytest -v -s tests/test_lora_ops.py
          VLLM_XPU_FORCE_XE_DEFAULT_KERNEL=1 XPU_KERNEL_TEST_SCOPE=${{ env.XPU_KERNEL_TEST_SCOPE }} ZE_AFFINITY_MASK=0,1 pytest -v -s tests/fused_moe/test_grouped_gemm.py::test_grouped_gemm

  clean-repo-bmg:
    runs-on: self-hosted-bmg
    needs: run-unit-tests-bmg
    steps:
      - name: Clean workspace
        run: |
          sudo chown -R "$(id -u):$(id -g)" . || true
          git clean -ffdx || true
          git reset --hard || true
